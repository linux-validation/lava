device_type: imx8mq-evk
job_name: sample job defination with reset shell support

timeouts:
  job:
    minutes: 120
  action:
    minutes: 3
  connection:
    minutes: 5
priority: medium
visibility: public

context:
  arch: arm64

actions:
- deploy:
    timeout:
      minutes: 15
    to: tftp
    kernel:
      url: file:/local/lava-ref-binaries/zImage-imx.bin
      type: image
    nfsrootfs:
      url: file:/local/lava-ref-binaries/test-internal-qt5-imx.tar.bz2
      compression: bz2
    dtb:
      url: file:/local/lava-ref-binaries/zImage-imx.dtb
    os: debian

- boot:
    method: u-boot
    commands: nfs
    failure_retry: 2
    auto_login:
      login_prompt: '(.*) login:'
      username: root
    prompts:
      - 'root@(.*):~#'
    timeout:
      minutes: 5

- test:
    reset_shell_para:
      max_log_lines_per_minute: 0
      exception_patterns:
      - 'Segmentation fault'
      - 'Kernel panic'
      case_reboot_indications:
      - 'Reboot expected'
      case_default_timeout: -1
      runner_recover_retry: 2
      heartbeat:
        interval: 300
        retry: 1
      overlay_pre_cmd:
        pre_cmd_for_non_reset_flag:
        - &pre1 env
        - &pre2 ls
        - uname -a
        pre_cmd_for_reset_flag:
        - *pre1
        - *pre2
    timeout:
      minutes: 120
    definitions:
    - from: inline
      name: smoke-case
      path: inline/imx-linux.yaml
      repository:
        metadata:
          format: Lava-Test Test Definition 1.0
          name: smoke-case-run
          description: Run smoke case
        run:
          steps:
          - *pre1
          - *pre2
          - echo -n "echo 'Segmentation" > test.sh && echo " fault'" >> test.sh && chmod +x test.sh
          - lava-test-case "Case_001" --shell "./test.sh"
          - lava-test-case "Case_002" --shell "ls"
