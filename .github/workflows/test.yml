permissions:
    contents: read
    checks: write
    id-token: write

name: LAVA tests
run-name: ${{ github.actor }}
on: [push, workflow_dispatch]
jobs:
  dispatcher-debian-13:
    runs-on: ubuntu-latest
    container: registry.gitlab.com/lava/ci-images/amd64/dispatcher-debian-13
    env:
      CI_JOB_STAGE: "test"
      ARCH: amd64
      COMPONENT: dispatcher
      VERSION: debian-13
    steps:
      - name: checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 100
      - run: ./.gitlab-ci/$CI_JOB_STAGE/$ARCH/$COMPONENT-$VERSION.sh setup
      - run: ./.gitlab-ci/$CI_JOB_STAGE/$ARCH/$COMPONENT-$VERSION.sh
      - run: find .
      - run: ls -alh
      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v5
        if: success() || failure() # always run even if the previous step fails
        with:
          report_paths: "${{ env.COMPONENT }}.xml"
